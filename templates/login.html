<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Patch Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #667eea;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.05) 35px, rgba(255,255,255,.05) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(255,255,255,.03) 35px, rgba(255,255,255,.03) 70px);
            position: relative;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
            pointer-events: none;
        }
        .login-container { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px);
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
        }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header .icon { font-size: 64px; margin-bottom: 15px; }
        .login-header h1 { color: #667eea; font-size: 32px; margin-bottom: 8px; font-weight: 700; }
        .login-header p { color: #666; font-size: 15px; }
        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #333; font-size: 14px; }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 600; 
            color: white; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
        .error { background: #fee; color: #c00; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; border-left: 4px solid #c00; }
        .features { margin-top: 30px; padding-top: 25px; border-top: 1px solid #e2e8f0; }
        .features h3 { color: #667eea; font-size: 14px; margin-bottom: 15px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .feature-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .feature-item { display: flex; align-items: center; font-size: 13px; color: #666; }
        .feature-item::before { content: '✓'; color: #48bb78; font-weight: bold; margin-right: 8px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">🖥️</div>
            <h1>Patch Manager</h1>
            <p>Server Patch Management System</p>
        </div>
        
        <div id="error" class="error"></div>
        
        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="features">
            <h3>System Features</h3>
            <div class="feature-list">
                <div class="feature-item">Remote Scanning</div>
                <div class="feature-item">Auto Updates</div>
                <div class="feature-item">Snapshots</div>
                <div class="feature-item">PDF Reports</div>
                <div class="feature-item">Multi-Server</div>
                <div class="feature-item">Secure SSH</div>
            </div>
        </div>
    </div>
    
    <script>
        async function login(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
