<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Details - Patch Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; }
        .sidebar { width: 250px; background: white; height: 100vh; position: fixed; left: 0; top: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px 0; }
        .sidebar-header { padding: 0 20px 20px 20px; border-bottom: 2px solid #e2e8f0; }
        .sidebar-header h2 { color: #667eea; font-size: 20px; margin: 0; }
        .sidebar-menu { list-style: none; padding: 20px 0; margin: 0; }
        .sidebar-menu a { display: block; padding: 15px 20px; color: #333; text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
        .sidebar-menu a:hover { background: #f7fafc; border-left-color: #667eea; color: #667eea; }
        .main-content { margin-left: 250px; padding: 20px; flex: 1; }
        .page-header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .page-header h1 { color: #667eea; font-size: 32px; margin-bottom: 10px; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; }
        .info-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .info-item { padding: 15px; background: #f7fafc; border-radius: 8px; border-left: 4px solid #667eea; }
        .info-label { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 20px; font-weight: bold; color: #333; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; color: white; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #667eea; }
        .btn-success { background: #48bb78; }
        .btn-warning { background: #ed8936; }
        .btn-danger { background: #f56565; }
        .btn:disabled { background: #cbd5e0; cursor: not-allowed; transform: none; }
        .patch-list { max-height: 500px; overflow-y: auto; background: #f7fafc; padding: 20px; border-radius: 8px; }
        .patch-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 5px; border-left: 3px solid #667eea; font-family: 'Courier New', monospace; font-size: 13px; }
        .badge { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-success { background: #c6f6d5; color: #22543d; }
        .badge-warning { background: #feebc8; color: #7c2d12; }
        .badge-danger { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>🖥️ Patch Manager</h2></div>
        <ul class="sidebar-menu">
            <li><a href="/">📊 Dashboard</a></li>
            <li><a href="/scan">🔍 Scan Servers</a></li>
            <li><a href="/install">⚡ Install Updates</a></li>
            <li><a href="/snapshot">📸 Snapshots</a></li>
            <li><a href="/reports">📄 Reports</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <a href="/" class="back-btn">← Back to Dashboard</a>
        
        <div class="page-header">
            <h1 id="serverName">Loading...</h1>
            <p id="serverIP"></p>
        </div>
        
        <div class="info-card">
            <h2>Server Information</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">OS Type</div>
                    <div class="info-value" id="osType">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Available Updates</div>
                    <div class="info-value" id="updateCount">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Status</div>
                    <div class="info-value" id="status">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Reboot Required</div>
                    <div class="info-value" id="rebootStatus">-</div>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="rescanServer()">🔄 Rescan</button>
                <button class="btn btn-success" id="installBtn" onclick="installUpdates()" disabled>⚡ Install Updates</button>
                <button class="btn btn-warning" onclick="createSnapshot()">📸 Create Snapshot</button>
                <button class="btn btn-primary" onclick="generateReport()">📄 Generate Report</button>
            </div>
        </div>
        
        <div class="info-card" id="patchesCard" style="display:none;">
            <h2>Available Patches (<span id="patchCount">0</span>)</h2>
            <div class="patch-list" id="patchList"></div>
        </div>
    </div>
    
    <script>
        const serverName = "{{ server_name }}";
        
        async function loadServerDetails() {
            try {
                const response = await fetch(`/api/server/${serverName}/details`);
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('serverName').textContent = data.name;
                document.getElementById('serverIP').textContent = data.ip || '';
                document.getElementById('osType').textContent = data.os_type || 'Unknown';
                document.getElementById('updateCount').textContent = data.count || 0;
                
                const statusEl = document.getElementById('status');
                if (data.count === 0) {
                    statusEl.innerHTML = '<span class="badge badge-success">✓ Up to Date</span>';
                } else {
                    statusEl.innerHTML = '<span class="badge badge-warning">⚠ Updates Available</span>';
                }
                
                const rebootEl = document.getElementById('rebootStatus');
                if (data.needs_reboot) {
                    rebootEl.innerHTML = '<span class="badge badge-danger">Yes</span>';
                } else {
                    rebootEl.innerHTML = '<span class="badge badge-success">No</span>';
                }
                
                // Enable/disable install button
                const installBtn = document.getElementById('installBtn');
                if (data.count > 0) {
                    installBtn.disabled = false;
                } else {
                    installBtn.disabled = true;
                }
                
                // Show patches if available
                if (data.updates && data.updates.length > 0) {
                    document.getElementById('patchesCard').style.display = 'block';
                    document.getElementById('patchCount').textContent = data.updates.length;
                    
                    const patchList = document.getElementById('patchList');
                    patchList.innerHTML = '';
                    data.updates.forEach(patch => {
                        const div = document.createElement('div');
                        div.className = 'patch-item';
                        div.textContent = patch;
                        patchList.appendChild(div);
                    });
                }
            } catch (error) {
                alert('Error loading server details: ' + error.message);
            }
        }
        
        async function rescanServer() {
            if (!confirm('Rescan this server?')) return;
            
            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({server: serverName})
                });
                
                const data = await response.json();
                alert('Scan complete!');
                loadServerDetails();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function installUpdates() {
            if (!confirm('Install all available updates on this server?')) return;
            
            try {
                const response = await fetch('/api/install', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({server: serverName})
                });
                
                const data = await response.json();
                alert(`Installation ${data.status}: ${data.snapshot ? 'Snapshot created: ' + data.snapshot : ''}`);
                loadServerDetails();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function createSnapshot() {
            try {
                const response = await fetch('/api/snapshot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({server: serverName})
                });
                
                const data = await response.json();
                alert('Snapshot created: ' + data.snapshot);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function generateReport() {
            try {
                const response = await fetch('/api/report/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({servers: [serverName]})
                });
                
                const data = await response.json();
                if (data.report) {
                    window.open(`/api/reports/view/${data.report}`, '_blank');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        loadServerDetails();
    </script>
</body>
</html>
